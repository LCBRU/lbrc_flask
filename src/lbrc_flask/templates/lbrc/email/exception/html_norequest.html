<!doctype html>

<html lang="en">
<head>
    <meta charset="utf-8">

    <title>{{ organisation_name }} {{ application_title }} Exception</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.5em;
        }

        h1, h2, h3, h4 {
            margin: 0;
            margin-bottom: 4px;
        }

        h1 {
            font-size: 1.6rem;
            columns: #222;
        }

        h2 {
            font-size: 1.3rem;
            color: #29465B;
        }

        h3 {
            font-size: 1.1rem;
            color: #8B4000;
        }

        h4 {
            font-size: 1rem;
        }

        p {
            margin-top: 0;
        }

        dl {
            display: grid;
            grid-template-columns: max-content auto;
        }

        dt {
            grid-column-start: 1;
            font-weight: bold;
            color: #F08000;
        }

        dd {
            grid-column-start: 2;
        }

        pre {
            background-color: #F8F8F8;
            padding: 1rem;
            border: #CCC 1px solid;
            border-radius: 0.5rem;
            min-width: 100%;
        }

</style>
</head>

<body>
	<h1>Exception for Application {{ organisation_name }} {{ application_title }}</h1>

    <h2>Traceback</h2>
    <pre>{{ traceback }}</pre>
</body>
</html>
